<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>EU Import Dashboard</title>

  <script
    type="module"
    src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js">
  </script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
    }

    .dashboard-container {
      width: 100%;
      min-height: 100vh;
    }

    tableau-viz {
      display: block;
      width: 100%;
      min-height: 100vh;
    }

    @media screen and (max-width: 600px) {
      tableau-viz {
        height: 1850px;
      }
    }
  </style>
</head>

<body>
  <main class="dashboard-container">
    <tableau-viz
      id="eu-import-dashboard"
      src="https://public.tableau.com/views/GlobalExportData/EUImportDashboard"
      width="100%"
      height="1000"
      toolbar="hidden">
    </tableau-viz>
  </main>
</body>
</html>
